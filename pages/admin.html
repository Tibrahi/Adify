<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify Dashboard</title>
    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-bullhorn"></i> Adify</h2>
                <p>Admin Dashboard</p>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="active"><a href="#"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="#"><i class="fas fa-ad"></i> Advertisements</a></li>
                    <li><a href="#"><i class="fas fa-users"></i> Users</a></li>
                    <li><a href="#"><i class="fas fa-chart-line"></i> Analytics</a></li>
                    <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
                <div class="header-profile">
                    <i class="fas fa-bell"></i>
                    <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Admin" class="profile-img">
                    <span>John Doe</span>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="dashboard-content">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-ad"></i></div>
                        <div class="stat-details">
                            <h3>Total Ads</h3>
                            <p id="totalAds">1,254</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-details">
                            <h3>Active Ads</h3>
                            <p id="activeAds">876</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-clock"></i></div>
                        <div class="stat-details">
                            <h3>Pending</h3>
                            <p id="pendingAds">124</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-dollar-sign"></i></div>
                        <div class="stat-details">
                            <h3>Revenue</h3>
                            <p id="revenue">$12,540</p>
                        </div>
                    </div>
                </div>

                <!-- Chart and Recent Ads Row -->
                <div class="dashboard-row">
                    <div class="chart-container">
                        <h3>Ad Views (Last 7 Days)</h3>
                        <canvas id="viewsChart"></canvas>
                    </div>
                    <div class="recent-ads">
                        <h3>Recent Advertisements</h3>
                        <table class="ads-table">
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Status</th>
                                    <th>Impressions</th>
                                </tr>
                            </thead>
                            <tbody id="recentAdsTableBody">
                                <!-- Filled by JavaScript -->
                            </tbody>
                        </table>
                        <a href="#" class="view-all">View all <i class="fas fa-arrow-right"></i></a>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <h3>Quick Actions</h3>
                    <div class="actions-grid">
                        <button class="action-btn"><i class="fas fa-plus-circle"></i> New Ad</button>
                        <button class="action-btn"><i class="fas fa-user-plus"></i> Add User</button>
                        <button class="action-btn"><i class="fas fa-file-export"></i> Export Report</button>
                        <button class="action-btn"><i class="fas fa-cog"></i> Settings</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../script/dashboard.js"></script>
</body>
</html>
