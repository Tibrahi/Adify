<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify • Member Hub</title>
    <link rel="icon" href="./assets/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap');

        :root {
            --emerald-glow: 0 0 40px -10px rgb(16 185 129);
        }

        .tail-container {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* 3D Perspective Container */
        .perspective {
            perspective: 1200px;
        }

        /* Ultra-premium 3D Card */
        .card-3d {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        box-shadow 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25),
                        0 0 0 1px rgb(255 255 255 / 0.1) inset;
        }
        
        .card-3d:hover {
            transform: rotateX(8deg) rotateY(12deg) translateZ(30px) scale(1.03);
            box-shadow: 0 40px 70px -15px rgb(16 185 129 / 0.3),
                        0 0 0 1px rgb(255 255 255 / 0.2) inset;
        }

        /* Glassmorphism + Depth */
        .glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        /* 3D Logo Text */
        .logo-3d {
            text-shadow: 
                0 4px 8px rgb(16 185 129 / 0.3),
                4px 4px 0 #10b981,
                -2px -2px 0 #10b981;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .logo-3d:hover {
            transform: rotate(-8deg) scale(1.05);
        }

        /* Neon emerald glow */
        .neon-emerald {
            text-shadow: 0 0 20px rgb(16 185 129),
                         0 0 40px rgb(16 185 129);
        }

        /* Campaign card inner depth */
        .campaign-inner {
            transform-style: preserve-3d;
        }

        /* Floating action button */
        .fab {
            box-shadow: 0 0 40px -10px rgb(16 185 129),
                        0 25px 50px -12px rgb(0 0 0);
        }
    </style>
</head>
<body class="tail-container bg-gradient-to-br from-slate-950 via-slate-900 to-emerald-950 text-slate-200 flex h-screen overflow-hidden">

    <!-- SIDEBAR – 3D floating -->
    <aside class="w-72 bg-slate-950/90 backdrop-blur-2xl border-r border-white/10 flex flex-col shadow-2xl transition-all duration-300">
        <!-- Logo -->
        <div class="p-8 flex items-center gap-3 border-b border-white/10">
            <div onclick="window.location.href='index.html'" 
                 class="logo-3d cursor-pointer flex items-center gap-2 text-4xl font-black tracking-tighter text-emerald-400">
                ADIFY
                <span class="text-[10px] font-normal tracking-[4px] text-white/60 block -mt-2">DASHBOARD</span>
            </div>
        </div>

        <nav class="flex-1 px-6 py-8 space-y-2">
            <button onclick="switchTab('overview')" id="nav-overview"
                    class="nav-btn w-full flex items-center gap-4 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white p-4 rounded-3xl font-semibold shadow-lg shadow-emerald-500/30 transition-all active:scale-95">
                <i class="fas fa-th-large text-xl"></i>
                <span class="text-lg">Overview</span>
            </button>
            
            <button onclick="switchTab('profile')" id="nav-profile"
                    class="nav-btn w-full flex items-center gap-4 text-slate-400 hover:text-white hover:bg-white/5 p-4 rounded-3xl font-semibold transition-all">
                <i class="fas fa-user-circle text-xl"></i>
                <span class="text-lg">My Profile</span>
            </button>

            <a href="index.html" 
               class="flex items-center gap-4 text-slate-400 hover:text-white hover:bg-white/5 p-4 rounded-3xl font-semibold transition-all mt-12">
                <i class="fas fa-arrow-left text-xl"></i>
                <span class="text-lg">Back to Site</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <button onclick="logout()" 
                    class="w-full flex items-center justify-center gap-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 hover:text-red-300 font-semibold py-3 rounded-3xl transition-all">
                <i class="fas fa-sign-out-alt"></i>
                <span>Log Out</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto relative">
        
        <!-- HEADER – Glass + floating -->
        <header class="glass sticky top-0 z-50 border-b border-white/10 px-8 py-6 flex items-center justify-between backdrop-blur-2xl">
            <div class="flex items-center gap-4">
                <div class="md:hidden text-3xl font-black logo-3d text-emerald-400">ADIFY</div>
                <h2 class="text-3xl font-bold tracking-tight hidden md:block">
                    Welcome back, <span id="dashName" class="text-emerald-400 neon-emerald">Fan</span>
                </h2>
            </div>

            <div class="flex items-center gap-6">
                <!-- Data Sync -->
                <div class="hidden md:flex items-center gap-3 text-xs font-medium text-slate-400">
                    <span class="px-4 py-2 rounded-2xl bg-white/5">DATA SYNC</span>
                    <button onclick="exportData()" class="p-3 hover:text-emerald-400 transition rounded-2xl hover:bg-white/5" title="Export">
                        <i class="fas fa-file-export text-xl"></i>
                    </button>
                    <label class="p-3 hover:text-emerald-400 transition rounded-2xl hover:bg-white/5 cursor-pointer" title="Import">
                        <i class="fas fa-file-import text-xl"></i>
                        <input type="file" onchange="importData(this)" class="hidden">
                    </label>
                </div>

                <!-- Notifications -->
                <button onclick="fakeNotification()" class="relative p-3 rounded-2xl hover:bg-white/5 transition">
                    <i class="fas fa-bell text-2xl"></i>
                    <span class="absolute -top-1 -right-1 bg-rose-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">3</span>
                </button>

                <!-- User avatar -->
                <div onclick="switchTab('profile')" 
                     id="headerAvatar"
                     class="w-11 h-11 rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-400 flex items-center justify-center text-white font-black text-2xl shadow-xl cursor-pointer ring-4 ring-emerald-400/30">
                    U
                </div>
            </div>
        </header>

        <div class="p-8 max-w-7xl mx-auto">
            
            <!-- OVERVIEW -->
            <section id="view-overview" class="animate__animated animate__fadeIn">
                
                <!-- STATS – 3D grid -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    
                    <!-- Active Shoutouts -->
                    <div onclick="switchTab('overview')" 
                         class="card-3d glass rounded-3xl p-8 perspective h-64 flex flex-col justify-between cursor-pointer">
                        <div>
                            <div class="flex items-center gap-3 text-emerald-400 text-sm font-semibold tracking-widest">
                                <i class="fas fa-bullhorn"></i>
                                ACTIVE SHOUTOUTS
                            </div>
                            <div id="statCount" class="text-7xl font-black text-white mt-4 tracking-tighter">12</div>
                        </div>
                        <div class="text-slate-400 text-sm flex items-center gap-2">
                            <i class="fas fa-arrow-trend-up"></i>
                            +4 this week
                        </div>
                    </div>

                    <!-- Favorite Artist -->
                    <div onclick="switchTab('profile')" 
                         class="card-3d glass rounded-3xl p-8 perspective h-64 flex flex-col justify-between cursor-pointer">
                        <div>
                            <div class="flex items-center gap-3 text-emerald-400 text-sm font-semibold tracking-widest">
                                <i class="fas fa-star"></i>
                                FAVORITE ARTIST
                            </div>
                            <div id="statStar" class="text-4xl font-bold text-white mt-6 leading-none">The Ben</div>
                        </div>
                        <div class="text-emerald-400 text-xs font-medium flex items-center gap-2">
                            <i class="fas fa-heart"></i> RWANDA’S #1
                        </div>
                    </div>

                    <!-- Quick Create -->
                    <button onclick="toggleModal('addModal')" 
                            class="card-3d group bg-gradient-to-br from-emerald-600 via-emerald-700 to-black rounded-3xl p-8 perspective h-64 flex flex-col justify-between text-left overflow-hidden relative">
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_30%_20%,rgba(255,255,255,0.15)_0%,transparent_70%)]"></div>
                        
                        <div class="relative z-10">
                            <div class="text-emerald-300 text-sm font-bold tracking-widest">QUICK ACTION</div>
                            <div class="text-white text-3xl font-black mt-6 group-hover:translate-x-3 transition-all">Create New Shoutout</div>
                        </div>
                        
                        <div class="relative z-10 flex items-center gap-3 text-4xl text-white">
                            <i class="fas fa-plus-circle"></i>
                        </div>
                    </button>
                </div>

                <!-- CAMPAIGNS HEADER -->
                <div class="flex items-end justify-between mb-8">
                    <h3 class="text-3xl font-black tracking-tighter text-white">Your Live Campaigns</h3>
                    <button onclick="toggleModal('addModal')" 
                            class="flex items-center gap-3 text-emerald-400 hover:text-white font-semibold text-sm transition">
                        <i class="fas fa-plus"></i> NEW CAMPAIGN
                    </button>
                </div>

                <!-- CAMPAIGNS GRID -->
                <div id="shoutoutList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Populated by JS -->
                </div>

                <!-- Empty state -->
                <div id="emptyState" class="hidden text-center py-24">
                    <div class="mx-auto w-24 h-24 bg-white/5 rounded-3xl flex items-center justify-center mb-6">
                        <i class="fas fa-layer-group text-5xl text-slate-500"></i>
                    </div>
                    <p class="text-slate-400 text-xl font-medium">No shoutouts yet</p>
                    <button onclick="toggleModal('addModal')" 
                            class="mt-8 px-8 py-4 bg-emerald-500 text-white rounded-3xl font-semibold shadow-2xl shadow-emerald-500/40">
                        Launch Your First Campaign
                    </button>
                </div>
            </section>

            <!-- PROFILE -->
            <section id="view-profile" class="hidden animate__animated animate__fadeIn">
                <div class="max-w-2xl mx-auto">
                    <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                        <!-- Profile header -->
                        <div class="bg-gradient-to-br from-emerald-900 to-black p-12 relative">
                            <div class="absolute top-8 right-8 text-8xl opacity-10">
                                <i class="fas fa-user-circle"></i>
                            </div>
                            <h2 class="text-4xl font-black text-white">Edit Profile</h2>
                            <p class="text-emerald-300 mt-2">This appears on every shoutout</p>
                        </div>

                        <form id="profileForm" class="p-12 space-y-10">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <label class="block text-xs font-semibold text-slate-400 mb-3 tracking-widest">FULL NAME</label>
                                    <input id="profName" type="text" required 
                                           class="w-full bg-white/5 border border-white/10 focus:border-emerald-400 rounded-2xl px-6 py-5 text-white text-xl font-medium focus:outline-none transition">
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-slate-400 mb-3 tracking-widest">LOCATION</label>
                                    <input id="profLocation" type="text" 
                                           class="w-full bg-white/5 border border-white/10 focus:border-emerald-400 rounded-2xl px-6 py-5 text-white text-xl font-medium focus:outline-none transition">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-3 tracking-widest">FAVORITE ARTIST (RWANDA)</label>
                                <select id="profStar" 
                                        class="w-full bg-white/5 border border-white/10 focus:border-emerald-400 rounded-2xl px-6 py-5 text-white text-xl font-medium focus:outline-none transition">
                                    <option value="Not Selected">Select an artist...</option>
                                    <option value="The Ben">The Ben</option>
                                    <option value="Bruce Melodie">Bruce Melodie</option>
                                    <option value="Meddy">Meddy</option>
                                    <option value="Israel Mbonyi">Israel Mbonyi</option>
                                    <option value="Knowless Butera">Knowless Butera</option>
                                    <option value="Rider Man">Rider Man</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-3 tracking-widest">BIO / SIGNATURE MESSAGE</label>
                                <textarea id="profBio" rows="5" 
                                          class="w-full bg-white/5 border border-white/10 focus:border-emerald-400 rounded-3xl px-6 py-5 text-white text-xl font-medium focus:outline-none transition"></textarea>
                            </div>

                            <div class="flex gap-4 pt-6">
                                <button type="button" onclick="switchTab('overview')" 
                                        class="flex-1 py-5 rounded-3xl font-semibold text-slate-400 hover:bg-white/5 transition">Cancel</button>
                                <button type="submit" 
                                        class="flex-1 py-5 bg-emerald-500 text-white rounded-3xl font-bold text-lg shadow-xl shadow-emerald-500/50 transition active:scale-95">
                                    SAVE PROFILE
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- NEW SHOUTOUT MODAL – 3D pop -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[999] flex items-center justify-center p-6">
        <div class="card-3d glass w-full max-w-lg rounded-3xl p-10 shadow-2xl animate__animated animate__zoomIn">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-3xl font-black text-white">New Shoutout</h3>
                <button onclick="toggleModal('addModal')" class="text-slate-400 hover:text-rose-400 text-3xl transition">
                    ✕
                </button>
            </div>

            <form id="addShoutoutForm" class="space-y-8">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-3">EVENT / TITLE</label>
                    <input id="shoutTitle" type="text" required placeholder="Selling 2 VIP tickets – Jazz Junction" 
                           class="w-full bg-white/5 border border-white/10 focus:border-emerald-400 rounded-2xl px-6 py-6 text-white text-xl placeholder:text-slate-500 focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-3">DETAILS</label>
                    <textarea id="shoutMessage" rows="5" required placeholder="2 tickets for The Ben live at Kigali Arena this Saturday..." 
                              class="w-full bg-white/5 border border-white/10 focus:border-emerald-400 rounded-3xl px-6 py-6 text-white text-xl placeholder:text-slate-500 focus:outline-none"></textarea>
                </div>

                <button type="submit" 
                        class="w-full py-6 bg-gradient-to-r from-emerald-500 to-teal-400 text-white rounded-3xl font-bold text-xl shadow-2xl shadow-emerald-500/60 transition-all active:scale-95">
                    POST LIVE NOW
                </button>
            </form>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-8 right-8 bg-slate-900 border border-emerald-400 text-emerald-400 px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 text-sm font-medium">
        <i class="fas fa-check-circle"></i>
        <span id="toastText"></span>
    </div>

    <script>
        // Tailwind script already loaded
        function initTailwind() {
            // Already using CDN
        }

        // Sample data
        let shoutouts = [
            {
                id: 1,
                title: "2 VIP Tickets – Jazz Junction",
                message: "Selling two VIP passes for The Ben live show this Saturday. Front row seats! DM for price.",
                time: "2h ago"
            },
            {
                id: 2,
                title: "Looking for Bruce Melodie Merch",
                message: "Anyone selling official Bruce Melodie hoodies in Kigali? Size M preferred.",
                time: "Yesterday"
            }
        ];

        // Render shoutouts with 3D tilt
        function renderShoutouts() {
            const container = document.getElementById('shoutoutList');
            container.innerHTML = '';
            
            shoutouts.forEach(shout => {
                const card = document.createElement('div');
                card.className = `card-3d glass rounded-3xl p-8 perspective group`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="text-emerald-400 text-xs font-bold tracking-widest">LIVE</div>
                        <div class="text-slate-400 text-xs">${shout.time}</div>
                    </div>
                    <h4 class="font-bold text-2xl text-white mb-3">${shout.title}</h4>
                    <p class="text-slate-300 line-clamp-3 mb-8">${shout.message}</p>
                    
                    <div class="flex items-center justify-between">
                        <div class="flex -space-x-4">
                            <div class="w-8 h-8 bg-emerald-400 rounded-2xl ring-4 ring-slate-900 flex items-center justify-center text-xs font-black">TB</div>
                        </div>
                        <button onclick="deleteShoutout(${shout.id}); event.stopImmediatePropagation()" 
                                class="text-rose-400 hover:text-rose-300 transition text-sm font-medium">DELETE</button>
                    </div>
                `;
                container.appendChild(card);
                
                // Add 3D mouse tilt
                add3DTilt(card);
            });

            document.getElementById('emptyState').classList.toggle('hidden', shoutouts.length > 0);
            document.getElementById('statCount').textContent = shoutouts.length;
        }

        // 3D Tilt Engine
        function add3DTilt(el) {
            el.addEventListener('mousemove', (e) => {
                const rect = el.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                
                const rotateX = (50 - y) / 3;
                const rotateY = (x - 50) / 3;
                
                el.style.transform = `perspective(1400px) rotateX(\( {rotateX}deg) rotateY( \){rotateY}deg) translateZ(40px)`;
            });
            
            el.addEventListener('mouseleave', () => {
                el.style.transform = `perspective(1400px) rotateX(0deg) rotateY(0deg) translateZ(0px)`;
            });
        }

        // Tab switch
        function switchTab(tab) {
            document.querySelectorAll('section[id^="view-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            // Highlight nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-gradient-to-r', 'from-emerald-500', 'to-emerald-600', 'text-white');
                if (btn.getAttribute('onclick').includes(tab)) {
                    btn.classList.add('bg-gradient-to-r', 'from-emerald-500', 'to-emerald-600', 'text-white');
                }
            });
        }

        // Modal
        function toggleModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                modal.querySelector('input').focus();
            }
        }

        // Fake toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = message;
            toast.classList.remove('hidden');
            toast.style.transform = 'translateY(20px)';
            toast.style.opacity = '0';
            
            setTimeout(() => {
                toast.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                toast.style.transform = 'translateY(0)';
                toast.style.opacity = '1';
            }, 10);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.classList.add('hidden'), 400);
            }, 2800);
        }

        // Form handlers
        function initForms() {
            // Profile form
            const profileForm = document.getElementById('profileForm');
            profileForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('profName').value || "Fan";
                const artist = document.getElementById('profStar').value;
                
                document.getElementById('dashName').textContent = name.split(' ')[0];
                document.getElementById('headerAvatar').textContent = name[0].toUpperCase();
                
                if (artist !== "Not Selected") {
                    document.getElementById('statStar').textContent = artist;
                }
                
                showToast("Profile saved • Changes live instantly");
                switchTab('overview');
            });

            // Add shoutout form
            const addForm = document.getElementById('addShoutoutForm');
            addForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const title = document.getElementById('shoutTitle').value;
                const message = document.getElementById('shoutMessage').value;
                
                if (!title || !message) return;
                
                shoutouts.unshift({
                    id: Date.now(),
                    title: title,
                    message: message,
                    time: "Just now"
                });
                
                renderShoutouts();
                toggleModal('addModal');
                showToast("Shoutout posted live! 🔥");
                
                // Clear form
                addForm.reset();
            });
        }

        function deleteShoutout(id) {
            shoutouts = shoutouts.filter(s => s.id !== id);
            renderShoutouts();
            showToast("Campaign removed");
        }

        function exportData() {
            showToast("Exported to clipboard (demo)");
        }

        function importData(input) {
            if (input.files.length) {
                showToast("Data imported successfully");
            }
        }

        function fakeNotification() {
            showToast("3 new shoutout requests");
        }

        function logout() {
            if (confirm("Log out of Adify?")) {
                window.location.href = "index.html";
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.metaKey && e.key === "k") {
                e.preventDefault();
                toggleModal('addModal');
            }
        });

        // Initialize everything
        function initializeDashboard() {
            // Tailwind ready
            renderShoutouts();
            initForms();
            
            // Load fake profile
            document.getElementById('profName').value = "Tuyizere";
            document.getElementById('profLocation').value = "Kigali, Rwanda";
            document.getElementById('profStar').value = "The Ben";
            document.getElementById('profBio').value = "Music lover • Always supporting Rwandan talent";
            
            // Set initial header
            document.getElementById('dashName').textContent = "Tuyizere";
            document.getElementById('headerAvatar').textContent = "T";
            
            // Activate overview
            switchTab('overview');
            
            // Demo: add one more card tilt after render
            setTimeout(() => {
                const cards = document.querySelectorAll('.card-3d');
                cards.forEach(card => add3DTilt(card));
            }, 300);
            
            showToast("Welcome to the new 3D Adify Hub ✨");
        }

        // Boot the dashboard
        window.onload = initializeDashboard;
    </script>
</body>
</html>
