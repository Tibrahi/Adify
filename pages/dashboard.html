<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify | Member Hub</title>
    <link rel="icon" href="./assets/logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body class="bg-slate-100 font-sans flex h-screen overflow-hidden text-slate-900">

    <aside class="w-64 bg-slate-900 text-white flex-col hidden md:flex transition-all duration-300">
        <div class="p-8">
            <h1 class="text-3xl font-black italic text-emerald-500 cursor-pointer" onclick="window.location.href='index.html'">
                ADIFY<span class="text-white text-xs block not-italic font-normal tracking-widest">DASHBOARD</span>
            </h1>
        </div>
        
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="switchTab('overview')" id="nav-overview" class="w-full flex items-center gap-3 bg-emerald-700 text-white p-3 rounded-xl font-bold transition-all shadow-lg">
                <i class="fas fa-th-large w-6"></i> Overview
            </button>
            <button onclick="switchTab('profile')" id="nav-profile" class="w-full flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-800 p-3 rounded-xl font-bold transition-all">
                <i class="fas fa-user-circle w-6"></i> My Profile
            </button>
            <a href="index.html" class="flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-800 p-3 rounded-xl font-bold transition-all mt-8">
                <i class="fas fa-arrow-left w-6"></i> Back to Site
            </a>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button onclick="logout()" class="flex items-center gap-3 text-red-400 hover:text-red-300 font-bold text-sm w-full p-2 rounded hover:bg-white/5 transition">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto relative bg-slate-50">
        
        <header class="bg-white/80 backdrop-blur-md p-6 shadow-sm sticky top-0 z-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="md:hidden text-emerald-800 font-black italic text-xl">ADIFY</div>
                <h2 class="text-xl md:text-2xl font-bold text-slate-800 hidden md:block">
                    Welcome, <span id="dashName" class="text-emerald-600">Fan</span>
                </h2>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:flex gap-2 text-xs font-bold text-slate-400 items-center mr-4 border-r border-slate-200 pr-4">
                    <span>DATA SYNC:</span>
                    <button onclick="exportData()" class="p-2 hover:text-emerald-600 transition" title="Export to Bluetooth"><i class="fas fa-file-export"></i></button>
                    <label class="p-2 hover:text-emerald-600 transition cursor-pointer" title="Import File"><i class="fas fa-file-import"></i>
                        <input type="file" onchange="importData(this)" class="hidden">
                    </label>
                </div>

                <div class="bg-emerald-100 text-emerald-800 h-10 w-10 rounded-full flex items-center justify-center font-bold" id="headerInitials">U</div>
            </div>
        </header>

        <div class="p-6 md:p-8 max-w-6xl mx-auto">
            
            <section id="view-overview" class="animate__animated animate__fadeIn">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col justify-between h-40">
                        <div class="text-slate-400 text-xs font-bold uppercase"><i class="fas fa-bullhorn mr-2"></i>Active Shoutouts</div>
                        <div class="text-5xl font-black text-slate-800" id="statCount">0</div>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col justify-between h-40">
                        <div class="text-slate-400 text-xs font-bold uppercase"><i class="fas fa-star mr-2"></i>Favorite Artist</div>
                        <div class="text-2xl font-bold text-emerald-600 truncate leading-tight" id="statStar">Select in Profile</div>
                    </div>
                    <button onclick="toggleModal('addModal')" class="bg-emerald-900 text-white p-6 rounded-[2rem] shadow-lg hover:bg-black transition group text-left flex flex-col justify-between h-40">
                        <div class="text-emerald-400 text-xs font-bold uppercase">Quick Action</div>
                        <div class="font-bold text-xl group-hover:translate-x-1 transition">
                            <i class="fas fa-plus-circle text-2xl mb-2 block"></i>
                            Create New Ad
                        </div>
                    </button>
                </div>

                <div class="flex justify-between items-end mb-6 border-b border-slate-200 pb-4">
                    <h3 class="text-xl font-black text-slate-800 uppercase tracking-tight">Your Campaigns</h3>
                </div>

                <div id="shoutoutList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    </div>

                <div id="emptyState" class="hidden text-center py-20">
                    <div class="bg-white inline-block p-8 rounded-full shadow-sm mb-4">
                        <i class="fas fa-layer-group text-4xl text-slate-200"></i>
                    </div>
                    <p class="text-slate-400 font-bold">No active ads or shoutouts.</p>
                    <button onclick="toggleModal('addModal')" class="mt-4 text-emerald-600 font-bold text-sm hover:underline">Start a campaign</button>
                </div>
            </section>


            <section id="view-profile" class="hidden animate__animated animate__fadeIn">
                <div class="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                    <div class="bg-emerald-900 p-8 text-white relative overflow-hidden">
                        <i class="fas fa-user-circle text-9xl absolute -bottom-10 -right-10 opacity-10"></i>
                        <h2 class="text-2xl font-bold relative z-10">Edit Your Profile</h2>
                        <p class="text-emerald-200 text-sm relative z-10">This info appears on your public ads.</p>
                    </div>
                    
                    <form id="profileForm" class="p-8 md:p-12 space-y-6">
                        <div class="grid md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Full Name</label>
                                <input type="text" id="profName" required class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-bold focus:outline-emerald-500">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Location</label>
                                <input type="text" id="profLocation" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-bold focus:outline-emerald-500">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Favorite Artist (Rwanda)</label>
                            <select id="profStar" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-bold focus:outline-emerald-500">
                                <option value="Not Selected">Select an Artist...</option>
                                <option value="The Ben">The Ben</option>
                                <option value="Bruce Melodie">Bruce Melodie</option>
                                <option value="Meddy">Meddy</option>
                                <option value="Israel Mbonyi">Israel Mbonyi</option>
                                <option value="Knowless Butera">Knowless Butera</option>
                                <option value="Rider Man">Rider Man</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Bio / Message</label>
                            <textarea id="profBio" rows="4" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-bold focus:outline-emerald-500"></textarea>
                        </div>

                        <div class="pt-4 flex justify-end gap-3">
                            <button type="button" onclick="switchTab('overview')" class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-50">Cancel</button>
                            <button type="submit" class="bg-emerald-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition transform hover:scale-105">
                                Save Profile
                            </button>
                        </div>
                    </form>
                </div>
            </section>

        </div>
    </main>

    <div id="addModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-[2rem] p-8 shadow-2xl animate__animated animate__zoomIn">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-slate-800">New Shoutout</h3>
                <button onclick="toggleModal('addModal')" class="text-slate-400 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            
            <form id="addShoutoutForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Event / Title</label>
                    <input type="text" id="shoutTitle" required placeholder="e.g. Selling 2 Tickets for Jazz Junction" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold focus:border-emerald-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Details</label>
                    <textarea id="shoutMessage" rows="3" required placeholder="Describe what you are offering or looking for..." class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl font-bold focus:border-emerald-500 focus:outline-none"></textarea>
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-emerald-700 transition">Post Live</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../script/user.js"></script>
    <script src="../script/auth.js"></script> 
</body>
</html>
