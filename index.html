<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adify | Fan Alert Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div class="bg-red-600 text-white py-2 overflow-hidden whitespace-nowrap">
        <div class="inline-block animate-marquee font-bold uppercase text-sm">
            🔥 NEW TOUR DATES ANNOUNCED FOR LONDON • ALBUM DROP IN 2 HOURS • VIP TICKETS SELLING FAST •  
        </div>
    </div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-3xl font-black text-red-600 tracking-tighter">ADIFY</span>
                <span class="bg-slate-900 text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-widest">Fans</span>
            </div>
            <div class="flex gap-6 items-center">
                <button class="text-slate-500 hover:text-red-600 font-semibold text-sm uppercase">Live Updates</button>
                <button class="bg-red-600 text-white px-5 py-2 rounded-full font-bold text-sm hover:shadow-lg transition">Subscribe</button>
            </div>
        </div>
    </nav>

    <header class="bg-slate-900 py-16 text-white text-center px-4 relative overflow-hidden">
        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-4xl md:text-6xl font-black mb-4 uppercase leading-none">The Fan Hub</h1>
            <p class="text-slate-400 text-lg md:text-xl font-medium">Real-time advertisements and alerts for upcoming star events.</p>
        </div>
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <i class="fas fa-bullhorn text-[20rem] -rotate-12 absolute -left-20 -bottom-20"></i>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-6 -mt-8 relative z-20">
        <div class="bg-white p-4 rounded-2xl shadow-xl border border-slate-100 flex flex-wrap gap-3 justify-center">
            <button class="filter-btn active">All Alerts</button>
            <button class="filter-btn">Concerts</button>
            <button class="filter-btn">Meet & Greets</button>
            <button class="filter-btn">Merch Drops</button>
            <button class="filter-btn">Interviews</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8" id="noticeGrid">
            </div>
    </main>

    <footer class="bg-white border-t border-slate-200 py-12 mt-12">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="font-bold text-slate-400 uppercase tracking-widest text-xs">&copy; 2025 ADIFY FAN NETWORK • ALL UPDATES VERIFIED</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
